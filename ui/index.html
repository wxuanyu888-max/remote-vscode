<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Remote VS Code</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部状态栏 -->
    <header class="header">
      <div class="header-left">
        <span class="app-title">Remote VS Code</span>
      </div>
      <div class="header-right">
        <span class="status" id="ws-status">
          <span class="status-dot"></span>
          未连接
        </span>
        <span class="system-info" id="system-info"></span>
      </div>
    </header>

    <!-- 主内容区域 -->
    <main class="main-container">
      <!-- 左侧：活动栏 + 文件浏览器 -->
      <aside class="sidebar">
        <!-- 活动栏图标 -->
        <div class="activity-bar">
          <button class="activity-btn active" data-view="explorer" title="资源管理器">
            <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
              <path d="M1.5 1h6l1 1H14l.5.5v4.5l-.5.5H10l-1 1v4l-1 1H2l-.5-.5v-11L1.5 1zm1 1v10h4v-3h2v3h4V3H7.5l-1-1H2.5z"/>
            </svg>
          </button>
          <button class="activity-btn" data-view="terminal" title="终端">
            <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
              <path d="M6.5 1.5l-5 7 5 7M1 9.5h10.5"/>
            </svg>
          </button>
        </div>

        <!-- 侧边面板容器 -->
        <div class="sidebar-content">
          <!-- 资源管理器视图 -->
          <div class="sidebar-view active" id="view-explorer">
            <div class="sidebar-header">
              <select class="project-select" id="project-select">
                <option value="">选择项目...</option>
              </select>
              <button class="icon-btn" id="btn-refresh-projects" title="刷新项目">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M13.65 2.35A8 8 0 1 0 16 8h-2a6 6 0 1 1-1.75-4.25L10 6h6V0l-2.35 2.35z"/>
                </svg>
              </button>
            </div>
            <!-- Session 选择 -->
            <div class="session-select-area">
              <select class="session-select" id="session-select">
                <option value="">选择 Session...</option>
              </select>
              <button class="icon-btn" id="btn-refresh-sessions" title="刷新Session">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M13.65 2.35A8 8 0 1 0 16 8h-2a6 6 0 1 1-1.75-4.25L10 6h6V0l-2.35 2.35z"/>
                </svg>
              </button>
            </div>
            <!-- 文件浏览器 -->
            <div class="file-browser">
              <div class="file-toolbar">
                <button class="icon-btn" id="btn-file-up" title="返回上级">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 1l4 5H4l4-5z"/>
                  </svg>
                </button>
                <button class="icon-btn" id="btn-file-refresh" title="刷新">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M13.65 2.35A8 8 0 1 0 16 8h-2a6 6 0 1 1-1.75-4.25L10 6h6V0l-2.35 2.35z"/>
                  </svg>
                </button>
              </div>
              <div class="file-path" id="current-path"></div>
              <div class="file-list" id="file-list">
                <div class="loading">选择项目查看文件</div>
              </div>
            </div>
          </div>

          <!-- 终端视图 -->
          <div class="sidebar-view" id="view-terminal">
            <div class="sidebar-header">
              <span class="sidebar-title">终端</span>
              <button class="icon-btn" id="btn-clear-terminal" title="清空">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5"/>
                </svg>
              </button>
            </div>
            <div class="terminal-input-area">
              <input type="text" class="cmd-input" id="cmd-input" placeholder="输入命令...">
              <button class="btn-small btn-primary" id="btn-exec">执行</button>
            </div>
            <div class="terminal-output" id="terminal-output">
              <div class="output-line system">欢迎使用终端</div>
            </div>
          </div>
        </div>
      </aside>

      <!-- 右侧：多标签页编辑器 -->
      <section class="editor-area">
        <!-- 编辑器分组容器 -->
        <div class="editor-groups" id="editor-groups">
          <!-- 第一个编辑器分组 -->
          <div class="editor-group" data-group-id="main">
            <!-- 标签栏 -->
            <div class="tabs-bar" id="tabs-bar">
              <!-- 标签通过JS动态生成 -->
            </div>

            <!-- 标签内容区 -->
            <div class="tab-contents" id="tab-contents">
              <!-- 默认显示欢迎页 -->
              <div class="tab-content active" data-tab="welcome">
                <div class="welcome-page">
                  <h1>Remote VS Code</h1>
                  <p>点击左侧文件打开编辑器</p>
                  <p>或在上方选择 Session 开始对话</p>
                </div>
                <!-- 对话区域 -->
                <div class="chat-container" id="chat-container">
                  <div class="chat-messages" id="chat-messages">
                    <div class="output-line system">选择 Session 开始对话</div>
                  </div>
                  <div class="chat-input-area">
                    <textarea class="chat-input" id="chat-input" placeholder="输入消息..." rows="1"></textarea>
                    <button class="btn-send" id="btn-send">发送</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
